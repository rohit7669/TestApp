name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Environment to deploy (dev/qa/prod)'
        required: true
        default: dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest ./spring-boot-server
          docker push ${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest ./react-client
          docker push ${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ github.event.inputs.deploy_env == 'dev' && secrets.DEV_SERVER || github.event.inputs.deploy_env == 'qa' && secrets.QA_SERVER || github.event.inputs.deploy_env == 'prod' && secrets.PROD_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            echo "Deploying to ${{ github.event.inputs.deploy_env }} environment"
            ENV=${{ github.event.inputs.deploy_env }} docker-compose pull
            ENV=${{ github.event.inputs.deploy_env }} docker-compose up -d