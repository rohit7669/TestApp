name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t your-dockerhub-username/testapp-backend:latest ./backend
          docker push your-dockerhub-username/testapp-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t your-dockerhub-username/testapp-frontend:latest ./frontend
          docker push your-dockerhub-username/testapp-frontend:latest

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH to Dev server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            ENV=dev docker-compose pull
            ENV=dev docker-compose up -d

  deploy-qa:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.deploy_env == 'qa'
    steps:
      - name: SSH to QA server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.QA_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            ENV=qa docker-compose pull
            ENV=qa docker-compose up -d

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.deploy_env == 'prod'
    steps:
      - name: SSH to Prod server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            ENV=prod docker-compose pull
            ENV=prod docker-compose up -d