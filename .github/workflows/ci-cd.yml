name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Environment to deploy (dev/qa/prod)'
        required: true
        default: dev

jobs:
  # ---------------- Build Backend & Frontend Images ----------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest ./spring-boot-server
          docker push ${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest ./react-client
          docker push ${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest

  # ---------------- Deploy to DEV ----------------
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.deploy_env == 'dev' }}
    steps:
      - name: Deploy to DEV environment
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            echo "Deploying to DEV environment"
            ENV=dev docker-compose pull
            ENV=dev docker-compose up -d

  # ---------------- Deploy to QA ----------------
  deploy-qa:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.deploy_env == 'qa' }}
    steps:
      - name: Deploy to QA environment
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.QA_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            echo "Deploying to QA environment"
            ENV=qa docker-compose pull
            ENV=qa docker-compose up -d

  # ---------------- Deploy to PROD ----------------
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.deploy_env == 'prod' }}
    steps:
      - name: Deploy to PROD environment
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            echo "Deploying to PROD environment"
            ENV=prod docker-compose pull
            ENV=prod docker-compose up -d