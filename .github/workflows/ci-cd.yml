name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Environment to deploy (dev/qa/prod)'
        required: true
        default: dev

jobs:
  # ---------------- Build Stage ----------------
  build:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.backend.outputs.image }}
      frontend_image: ${{ steps.frontend.outputs.image }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        id: backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest ./spring-boot-server
          docker push ${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest
          echo "image=${{ secrets.DOCKER_USERNAME }}/testapp-backend:latest" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        id: frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest ./react-client
          docker push ${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest
          echo "image=${{ secrets.DOCKER_USERNAME }}/testapp-frontend:latest" >> $GITHUB_OUTPUT

  # ---------------- Deploy Stage ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Determine server for environment
        id: server
        run: |
          if [ "${{ github.event.inputs.deploy_env }}" = "dev" ]; then
            echo "SERVER=${{ secrets.DEV_SERVER }}" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.deploy_env }}" = "qa" ]; then
            echo "SERVER=${{ secrets.QA_SERVER }}" >> $GITHUB_ENV
          else
            echo "SERVER=${{ secrets.PROD_SERVER }}" >> $GITHUB_ENV
          fi
          echo "Deploying to ${{ github.event.inputs.deploy_env }} on $SERVER"

      - name: Deploy to selected environment
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ env.SERVER }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/TestApp
            echo "Pulling latest Docker images..."
            ENV=${{ github.event.inputs.deploy_env }} docker-compose pull
            echo "Starting containers..."
            ENV=${{ github.event.inputs.deploy_env }} docker-compose up -d
            echo "Deployment to ${{ github.event.inputs.deploy_env }} completed!"