services:

  mysql:
    image: mysql:8.0
    container_name: prod-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./spring-boot-server   # ✅ correct path
      dockerfile: Dockerfile
    container_name: prod-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./react-client         # ✅ correct path (VERY IMPORTANT)
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}   # ✅ THIS IS THE FIX
    container_name: prod-frontend
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "3000:80"

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge