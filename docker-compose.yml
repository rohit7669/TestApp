version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - .env.${ENV}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - .env.${ENV}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - .env.${ENV}
    ports:
      - "3000:80"
    depends_on:
      - backend